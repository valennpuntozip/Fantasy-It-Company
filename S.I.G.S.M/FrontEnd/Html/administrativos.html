<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrativos — Iniciar sesión</title>
    <link rel="stylesheet" href="../CSS/style.administrativos.css" />
</head>
<body>
    <header>
        <div class="header-container">
            <img class="header-logo" src="../Assets/img/logo.png" alt="Hospital de Clínicas" />
        </div>
    </header>

    <div class="wrap">
        <main class="card" role="main">
            <h1>Iniciar sesión</h1>
            <p class="lead">Acceso para personal administrativos</p>

            <form id="form-admin" action="#" method="post" novalidate>
                <div class="form-group">
                    <label for="cedula">Cédula</label>
                    <input id="cedula" name="cedula" type="text" inputmode="numeric" autocomplete="off" required />
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" name="nombre" type="text" autocomplete="given-name" required />
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input id="contrasena" name="contrasena" type="password" autocomplete="current-password" required />
                </div>

                <button type="submit" class="btn btn-primary" onclick="window.location.href='botones.html'; return false;">Iniciar sesión</button>
            </form>

            <div class="guest-row">
                <p>¿No es un funcionario?</p>
                <a href="botones.html" id="guest-btn" class="btn btn-ghost">Iniciar sesión como invitado</a>
            </div>
        </main>
    </div>
</body>
</html>
